name: dreamscape CI Pipeline
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
env:
  DB_NAME: postgres
  DB_USER: postgres
  DB_PASSWORD: password
  DB_HOST: localhost
  DB_PORT: 5432
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        # Указываем пароль по умолчанию для PostgreSQL
        env:
          POSTGRES_PASSWORD: password
        # Включаем проверку работоспособности, чтобы убедиться, что служба запущена
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test with pytest
        run: pytest -vv