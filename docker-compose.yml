version: '3.8'
services:
 web:
   build: .
   env_file: 
   - ./.env
   command: gunicorn dreamscape_site.wsgi:application --bind 0.0.0.0:8000
   volumes:
     - .:/code
   ports:
     - "8000:8000"
   depends_on:
     - db
     - redis
 db:
   image: postgres:16
   volumes:
     - postgres_data:/var/lib/postgresql/data/
   env_file: 
   - ./.env
 redis:
    image: redis:latest
    container_name: dreamscape_redis
    ports:
     - "6379:6379"
 celery:
    build: .
    env_file: 
     - ./.env
    container_name: dreamscape_celery
    command: celery -A dreamscape_site worker -l info
    depends_on:
      - db
      - redis
volumes:
 postgres_data: