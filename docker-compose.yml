version: '3.8'
services:
 web:
   build: .
   command: gunicorn dreamscape_site.wsgi:application --bind 0.0.0.0:8000
   volumes:
     - .:/code
   ports:
     - "8000:8000"
   depends_on:
     - db
 db:
   image: postgres:16
   volumes:
     - postgres_data:/var/lib/postgresql/data/
   environment:
     POSTGRES_USER: ${DB_USER}
     POSTGRES_PASSWORD: ${DB_PASSWORD}
     POSTGRES_DB: ${DB_NAME}
volumes:
 postgres_data: